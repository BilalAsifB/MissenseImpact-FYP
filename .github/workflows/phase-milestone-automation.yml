name: Phase Milestone Automation

on:
  issues:
    types: [edited]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-phase1:
    runs-on: ubuntu-latest
    if: github.repository == 'BilalAsifB/MissenseImpact-FYP'
    steps:
      - name: Evaluate checklist progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Only trigger for Phase 1 issue
            if (!issue.title.toLowerCase().includes("phase 1")) return;

            const body = issue.body || "";
            const checkboxes = body.match(/- \[.\]/g) || [];
            const total = checkboxes.length;
            const completed = checkboxes.filter(b => b.includes("[x]")).length;

            console.log(`Phase 1 progress: ${completed}/${total}`);

            if (completed === total && total > 0 && issue.state === "open") {
              // ✅ Post completion comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: "🎉 **Phase 1 complete!** Dataset collection & preprocessing milestone achieved. The issue will now close and Phase 2 will begin automatically."
              });

              // ✅ Close the current issue
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });

              // ✅ Create the next Phase issue
              const newIssue = await github.rest.issues.create({
                owner,
                repo,
                title: "Phase 2: Bias Quantification & Baseline Evaluation",
                body: "Auto-generated by milestone workflow. This issue will track bias quantification, baseline model evaluation, and ancestry gap analysis.",
                labels: ["phase-2", "bias-quantification", "high-priority"],
                assignees: ["BilalAsifB", "samiurrehman", "MustafaWaqar"]
              });

              console.log(`Created Phase 2 issue: #${newIssue.data.number}`);

              // ✅ Link to your existing project board (Project #1)
              await github.graphql(`
                mutation($project: ID!, $issue: ID!) {
                  addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                    item {
                      id
                    }
                  }
                }
              `, {
                project: "PVT_kwHOBaaXmc4BEcDy", 
                issue: newIssue.data.node_id
              });

              console.log("Phase 2 issue added to Project #1 board ✅");
            }
