name: Phase Milestone Automation

on:
  issues:
    types: [edited]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-phase:
    runs-on: ubuntu-latest
    if: github.repository == 'BilalAsifB/MissenseImpact-FYP'

    steps:
      - name: Evaluate Phase Checklist and Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (!issue || !issue.title) {
              console.log("⚠️ No issue context found, skipping.");
              return;
            }

            // Only act on Phase issues
            const title = issue.title.toLowerCase();
            if (!title.includes("phase ")) {
              console.log("ℹ️ Not a phase issue. Skipping.");
              return;
            }

            // Count completed checkboxes
            const body = issue.body || "";
            const checkboxes = body.match(/- \[.\]/g) || [];
            const total = checkboxes.length;
            const completed = checkboxes.filter(b => b.includes("[x]") || b.includes("[X]")).length;

            console.log(`📋 Progress: ${completed}/${total} for ${issue.title}`);

            // Only proceed when all tasks complete
            if (completed === total && total > 0 && issue.state === "open") {
              console.log("✅ All tasks complete — closing and creating next phase.");

              // Add completion comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `🎉 **${issue.title} complete!** This issue will now close and the next phase issue will be created automatically.`
              });

              // Close current issue
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });

              // Determine next phase number
              const phaseMatch = title.match(/phase\s*(\d+)/);
              let nextPhaseNumber = phaseMatch ? parseInt(phaseMatch[1], 10) + 1 : 0;

              if (nextPhaseNumber > 0 && nextPhaseNumber <= 5) {
                // Define phase titles and labels
                const phaseTitles = {
                  2: "Bias Quantification & Baseline Evaluation",
                  3: "Model Adaptation & Recalibration",
                  4: "Evaluation & Fairness Analysis",
                  5: "Pipeline & Dissertation Integration"
                };

                const labelMap = {
                  2: "Phase 2 - Bias Analysis",
                  3: "Phase 3 - Model Adaptation",
                  4: "Phase 4 - Evaluation",
                  5: "Phase 5 - Pipeline & Report"
                };

                const nextTitle = `Phase ${nextPhaseNumber}: ${phaseTitles[nextPhaseNumber]}`;

                // Create the next issue
                const newIssue = await github.rest.issues.create({
                  owner,
                  repo,
                  title: nextTitle,
                  body: "🧩 Auto-generated by milestone workflow. Edit and assign as needed.",
                  labels: [labelMap[nextPhaseNumber]],
                  assignees: ["BilalAsifB", "MusW02", "Wander-1ife"]
                });

                console.log(`🆕 Created Phase ${nextPhaseNumber} issue: #${newIssue.data.number}`);

                // --- PROJECT AUTOMATION START ---
                const projectId = "PVT_kwHOBaaXmc4BEcDy";

                // Add the issue to the Project
                const addResponse = await github.graphql(`
                  mutation($project: ID!, $issue: ID!) {
                    addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                      item { id }
                    }
                  }
                `, {
                  project: projectId,
                  issue: newIssue.data.node_id
                });

                console.log("✅ Added new issue to Project board");

                // Fetch all project fields
                const fieldsResponse = await github.graphql(`
                  query($project: ID!) {
                    node(id: $project) {
                      ... on ProjectV2 {
                        fields(first: 20) {
                          nodes {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                `, { project: projectId });

                // Find "Status" field
                const statusField = fieldsResponse.node.fields.nodes.find(
                  f => f.name.toLowerCase() === "status"
                );

                if (!statusField) {
                  console.log("⚠️ No 'Status' field found — issue may appear under 'No Status'.");
                } else {
                  // Find a matching status option (To Do, Not Started, or Backlog)
                  const toDoOption = statusField.options.find(
                    o => o.name.toLowerCase() === "to do"
                  );

                  if (!toDoOption) {
                    console.log("⚠️ Could not find 'To Do' or 'Not Started' status option.");
                  } else {
                    // Update issue's Status field to To Do
                    await github.graphql(`
                      mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                        updateProjectV2ItemFieldValue(input: {
                          projectId: $project,
                          itemId: $item,
                          fieldId: $field,
                          value: { singleSelectOptionId: $value }
                        }) {
                          projectV2Item { id }
                        }
                      }
                    `, {
                      project: projectId,
                      item: addResponse.addProjectV2ItemById.item.id,
                      field: statusField.id,
                      value: toDoOption.id
                    });

                    console.log(`🎯 Status set to '${toDoOption.name}' successfully`);
                  }
                }
                // --- PROJECT AUTOMATION END ---
              } else {
                console.log("🏁 Final phase reached — no further issues to create.");
              }
            } else {
              console.log("⏳ Phase incomplete — waiting for all checkboxes to be marked.");
            }
