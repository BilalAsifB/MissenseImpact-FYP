# default hyperparameters

model:
  esm_model_name:    "facebook/esm1b_t33_650M_UR50S"
  freeze_esm_layers: 30
  # Auxiliary masked-LM regularization during training. Mirrors the
  # masked-MSA loss that AlphaMissense retains during fine-tuning: a
  # fraction of non-variant residues is masked and the LM head is
  # trained with standard cross-entropy on them. Set mlm_lambda=0 to
  # disable (pure pathogenicity objective).
  mlm_mask_prob:     0.15
  mlm_max_masks:     80

training:
  max_steps:     350000
  warmup_steps:  1000
  batch_size:    16
  esm_lr:        1.0e-5
  head_lr:       1.0e-4
  weight_decay:  0.01
  grad_clip:     0.1
  ema_decay:     0.999
  eval_every:    500
  patience:      15

loss:
  clip_neg:    0.0
  clip_pos:   -1.0
  mlm_lambda:  0.1

proxy_sampling:
  # "mutation_rate" matches the AlphaMissense trinucleotide-context
  # resampling approximation (see data/mutation_rates.py); "uniform"
  # is kept for ablation only.
  mode: "mutation_rate"

data:
  max_length: 1024
  val_frac:   0.1
  test_frac:  0.1
  min_an:     100

paths:
  data_dir:    "data/processed"
  cache_dir:   "data/cache"
  checkpoint_dir: "checkpoints"
  report_dir:     "reports"
